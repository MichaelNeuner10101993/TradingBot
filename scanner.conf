# scanner.conf — Konfiguration für den CAT-TRADING Trend Scanner
# Format: KEY="VALUE" (Shell-Variablen, analog zu bot.conf.d/*.conf)

# Scan-Intervall in Sekunden (default: 30 Minuten)
SCAN_INTERVAL_SECONDS="1800"

# Mindest-24h-Handelsvolumen in EUR für einen Coin (filtert illiquide Paare)
SCAN_MIN_VOLUME_EUR="500000"

# Mindest-Score um einen neuen Bot zu starten (0-8 Punkte möglich)
SCAN_MIN_SCORE="4"

# Maximale Anzahl gleichzeitig laufender Bots (Kapitalschutz)
SCAN_MAX_BOTS="10"

# Mindest-Kapital pro Bot in EUR (verhindert zu kleine Positionen)
SCAN_MIN_CAPITAL_PER_BOT="20"

# Konsekutive SL-Hits bevor ein Bot als Stopp-Kandidat gilt
SCAN_CONSECUTIVE_SL_THRESHOLD="3"

# Candle-Timeframe für die Momentum-Analyse
SCAN_CANDLE_TIMEFRAME="1h"

# Anzahl Candles pro Pair (min 210 für SMA200)
SCAN_CANDLE_LIMIT="250"

# Pause zwischen Candle-Fetches in Sekunden (Kraken Rate-Limit)
SCAN_RATE_LIMIT_SLEEP="0.5"

# URL des Web-Dashboards (für Bot-Start/Stopp)
SCAN_WEB_API_URL="http://localhost:5001"

# DRY-RUN: true = nur loggen, kein echter Start/Stopp
# WICHTIG: nach 2-3 erfolgreichen Dry-Run-Zyklen auf "false" setzen!
SCAN_DRY_RUN="false"

# Log-Level: DEBUG, INFO, WARNING, ERROR
SCAN_LOG_LEVEL="INFO"

# Bot-Argumente für Scanner-gestartete Coins (gleiche Flags wie ETH/ADA manuell)
SCAN_BOT_ARGS="--live --sl 0.015 --tp 0.50 --trailing-sl --trailing-sl-pct 0.03 --sma200-filter --slope-filter --breakeven --breakeven-pct 0.008 --partial-tp --partial-tp-fraction 0.5 --htf-timeframe 1h --htf-fast 21 --htf-slow 55 --startup-delay 60 --volume-factor 1.5"

# Grid-Bot Parameter
SCAN_GRID_STEP=0.008
SCAN_GRID_LEVELS=3

# Safety-Buffer für dynamisches Grid-Budget (analog zu Trend-Bots)
SCAN_SAFETY_BUFFER=0.10
